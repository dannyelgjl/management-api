services:
  postgres:
    image: postgres:16-alpine
    container_name: management-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: management
      POSTGRES_PASSWORD: management
      POSTGRES_DB: management_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U management -d management_api"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
